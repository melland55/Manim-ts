<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>manim-ts — Full Engine Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #eee;
      padding: 16px;
    }
    h1 {
      margin-bottom: 8px;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #9cdceb;
    }
    canvas {
      border: 1px solid #333;
      border-radius: 6px;
      max-width: 100%;
      height: auto;
    }

    /* ── Category tabs ─────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      margin: 12px 0 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab {
      padding: 6px 16px;
      border: 1px solid #444;
      border-radius: 4px 4px 0 0;
      background: #1a1a1a;
      color: #999;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .tab:hover { background: #252525; color: #ccc; }
    .tab.active { background: #222; color: #9cdceb; border-bottom-color: #222; }

    /* ── Button panels (one per category) ─────── */
    .panel {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 0 0 6px 6px;
      min-width: 600px;
      max-width: 900px;
    }
    .panel.active { display: flex; }
    .panel button {
      padding: 6px 14px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #222;
      color: #ddd;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s;
    }
    .panel button:hover { background: #333; }
    .panel button:active { background: #444; }

    /* ── Status log ────────────────────────────── */
    #log {
      margin-top: 12px;
      width: 100%;
      max-width: 900px;
      max-height: 120px;
      overflow-y: auto;
      padding: 8px 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 0.75rem;
      color: #7a7;
      line-height: 1.5;
    }

    .info {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #888;
    }
    .info strong { color: #9cdceb; }
  </style>
</head>
<body>
  <h1>manim-ts — Full Engine Test</h1>
  <canvas id="manim-canvas" width="1280" height="720"></canvas>

  <!-- Category tabs -->
  <div class="tabs">
    <div class="tab active" data-panel="geometry">Geometry</div>
    <div class="tab" data-panel="transforms">Transforms</div>
    <div class="tab" data-panel="animations">Animations</div>
    <div class="tab" data-panel="colors">Colors</div>
    <div class="tab" data-panel="stress">Stress Test</div>
  </div>

  <!-- Geometry panel -->
  <div class="panel active" id="panel-geometry">
    <button onclick="testCircle()">Circle</button>
    <button onclick="testSquare()">Square</button>
    <button onclick="testTriangle()">Triangle</button>
    <button onclick="testLine()">Line</button>
    <button onclick="testArc()">Arc</button>
    <button onclick="testPolygon()">Custom Polygon</button>
    <button onclick="testRegularPolygons()">Regular Polygons (5-8)</button>
    <button onclick="testAllGeometry()">ALL Geometry</button>
    <button onclick="clearScene()">Clear</button>
  </div>

  <!-- Transforms panel -->
  <div class="panel" id="panel-transforms">
    <button onclick="testShift()">Shift</button>
    <button onclick="testScale()">Scale</button>
    <button onclick="testRotate()">Rotate</button>
    <button onclick="testChained()">Chained (shift+scale+rotate)</button>
    <button onclick="testMoveTo()">MoveTo Positions</button>
    <button onclick="clearScene()">Clear</button>
  </div>

  <!-- Animations panel -->
  <div class="panel" id="panel-animations">
    <button onclick="animCreate()">Create</button>
    <button onclick="animGrow()">GrowFromCenter</button>
    <button onclick="animFadeIn()">FadeIn</button>
    <button onclick="animFadeOut()">FadeOut</button>
    <button onclick="animRotate()">Rotate</button>
    <button onclick="animTransform()">Transform (morph)</button>
    <button onclick="animSequence()">Full Sequence</button>
    <button onclick="clearScene()">Clear</button>
  </div>

  <!-- Colors panel -->
  <div class="panel" id="panel-colors">
    <button onclick="testColorPalette()">Full Palette</button>
    <button onclick="testColorGradient()">Gradient Row</button>
    <button onclick="clearScene()">Clear</button>
  </div>

  <!-- Stress test panel -->
  <div class="panel" id="panel-stress">
    <button onclick="stress10()">10 Shapes</button>
    <button onclick="stress50()">50 Shapes</button>
    <button onclick="stress100()">100 Shapes</button>
    <button onclick="clearScene()">Clear</button>
  </div>

  <!-- Log -->
  <div id="log"></div>

  <div class="info">
    Powered by the <strong>real manim-ts engine</strong> &mdash;
    shapes constructed with engine classes, rendered with fast Canvas2D.
  </div>

  <!-- Tab switching logic -->
  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
      });
    });
  </script>

  <script type="module" src="./real-demo.ts"></script>
</body>
</html>
