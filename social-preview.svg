<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#111128"/>
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#58c4dd" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#58c4dd" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Coordinate axes (subtle) -->
  <g transform="translate(640, 320)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
    <line x1="-500" y1="0" x2="500" y2="0"/>
    <line x1="0" y1="-250" x2="0" y2="250"/>
    <!-- Tick marks -->
    <line x1="-200" y1="-4" x2="-200" y2="4"/>
    <line x1="-100" y1="-4" x2="-100" y2="4"/>
    <line x1="100" y1="-4" x2="100" y2="4"/>
    <line x1="200" y1="-4" x2="200" y2="4"/>
    <line x1="-4" y1="-100" x2="4" y2="-100"/>
    <line x1="-4" y1="100" x2="4" y2="100"/>
  </g>

  <!-- Sine wave -->
  <g transform="translate(640, 320)">
    <path d="M -400,-80 C -350,-180 -300,-180 -250,-80 C -200,20 -150,20 -100,-80 C -50,-180 0,-180 50,-80 C 100,20 150,20 200,-80 C 250,-180 300,-180 350,-80"
          fill="none" stroke="#58c4dd" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Circle (Manim blue) -->
  <circle cx="420" cy="310" r="80" fill="none" stroke="#58c4dd" stroke-width="3" stroke-opacity="0.8"/>

  <!-- Square (Manim green) -->
  <rect x="570" y="250" width="130" height="130" rx="2" fill="none" stroke="#83c167" stroke-width="3" stroke-opacity="0.7" transform="rotate(15, 635, 315)"/>

  <!-- Triangle (Manim yellow) -->
  <polygon points="810,240 880,370 740,370" fill="none" stroke="#fcba03" stroke-width="3" stroke-opacity="0.7"/>

  <!-- Arrow -->
  <g stroke="#fc6255" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round" stroke-linejoin="round">
    <line x1="350" y1="380" x2="890" y2="250"/>
    <polyline points="875,245 890,250 880,264"/>
  </g>

  <!-- Title -->
  <text x="640" y="520" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="600" fill="#ffffff" letter-spacing="2">
    Manim-ts
  </text>

  <!-- Subtitle -->
  <text x="640" y="565" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" fill="#888899" letter-spacing="1">
    Mathematical Animation Engine for TypeScript
  </text>

  <!-- Small TS badge -->
  <g transform="translate(820, 488)">
    <rect x="0" y="0" width="44" height="26" rx="4" fill="#3178c6"/>
    <text x="22" y="18" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">TS</text>
  </g>
</svg>
