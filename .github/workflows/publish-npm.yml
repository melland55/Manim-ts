name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (e.g. latest, next, placeholder)"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-*) NPM_TAG="placeholder" ;;
            *)   NPM_TAG="latest" ;;
          esac
          npm publish --provenance --access public --tag "$NPM_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --provenance --access public --tag "${{ github.event.inputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
